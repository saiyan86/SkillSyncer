name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package with dev extras
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest -v

      - name: Verify CLI entry point
        run: skillsyncer --help

  build:
    name: build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build tooling
        run: python -m pip install --upgrade pip build

      - name: Build sdist and wheel
        run: python -m build

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*
          if-no-files-found: error

  install-script-posix:
    name: install.sh (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pipx
        run: python -m pip install --upgrade pip pipx

      - name: Run install.sh against local checkout
        env:
          SKILLSYNCER_SOURCE: ${{ github.workspace }}
        run: sh ./install.sh

      - name: Verify installed CLI runs
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          skillsyncer --help

  install-script-windows:
    name: install.ps1 (windows-latest)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pipx
        run: python -m pip install --upgrade pip pipx

      - name: Run install.ps1 against local checkout
        shell: pwsh
        env:
          SKILLSYNCER_SOURCE: ${{ github.workspace }}
        run: ./install.ps1
