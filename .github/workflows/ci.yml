name: CI

# Budget note: macOS minutes count 10× against the Pro quota. The
# macOS install.sh smoke runs weekly; PR/push runs do test + build
# on Linux + a single macOS test job.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install package with dev extras
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest -v

      - name: Verify CLI entry point
        run: skillsyncer --help

  build:
    name: build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install build tooling
        run: python -m pip install --upgrade pip build

      - name: Build sdist and wheel
        run: python -m build

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*
          if-no-files-found: error

  e2e:
    # End-to-end tests that drive the *installed* `skillsyncer` binary
    # via subprocess. We install the freshly-built wheel into an isolated
    # pipx env (the real-user install path), then run only the e2e
    # marker. This catches packaging / entry-point regressions the
    # in-process tests can't, since they import skillsyncer directly.
    name: e2e (installed-from-wheel)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Download built distribution
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Install pipx + pytest
        run: |
          python -m pip install --upgrade pip pipx pytest pyyaml
          python -m pipx ensurepath

      - name: Install skillsyncer from the built wheel via pipx
        run: |
          WHEEL=$(ls dist/*.whl | head -1)
          echo "Installing $WHEEL"
          python -m pipx install --force "$WHEEL"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Verify the installed CLI is reachable
        run: |
          which skillsyncer
          skillsyncer --version

      - name: Run E2E tests against the installed CLI
        run: python -m pytest tests/e2e -v -m e2e

  install-script-linux:
    name: install.sh (ubuntu-latest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install pipx
        run: python -m pip install --upgrade pip pipx

      - name: Run install.sh against local checkout
        env:
          SKILLSYNCER_SOURCE: ${{ github.workspace }}
        run: sh ./install.sh

      - name: Verify installed CLI runs
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          skillsyncer --help

  install-script-macos:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    name: install.sh (macos-latest)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install pipx
        run: python -m pip install --upgrade pip pipx

      - name: Run install.sh against local checkout
        env:
          SKILLSYNCER_SOURCE: ${{ github.workspace }}
        run: sh ./install.sh

      - name: Verify installed CLI runs
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          skillsyncer --help
