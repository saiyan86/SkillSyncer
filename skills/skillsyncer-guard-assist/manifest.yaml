name: skillsyncer-guard-assist
version: 0.1.0
description: >
  Help the user resolve a blocked push after the deterministic guard
  loop (scan → fix → re-scan, up to 5 attempts) has exhausted its
  auto-fix budget. You do NOT run the loop yourself — it already ran.
  You name the unresolved detections the user couldn't auto-fix, or
  you classify false positives and add them to config.yaml allow_patterns.
requires:
  secrets: []
triggers:
  - "`git push` failed with 'SkillSyncer: push FAILED after 5 attempts'."
  - "`skillsyncer report latest --type=guard` shows `failed`."
  - "User says 'push got blocked, help me fix it'."
parameters:
  - name: report_path
    required: false
    description: "Path to a guard report. Default: latest."
